<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault</title>
  <link rel="stylesheet" href="style.css" id="theme-link">
  <link rel="stylesheet" href="./node_modules/toastify-js/src/toastify.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="./node_modules/toastify-js/src/toastify.js"></script>
  <script src="./node_modules/imask/dist/imask.js"></script>
  <script>
    window.addEventListener('load', function() {
      document.body.classList.add('show');
    });
    window.addEventListener('beforeunload', function() {
      navigator.clipboard.writeText(" ");
    });
  </script>
</head>
<body>

  <!-- Confirm modal (replaces window.confirm for self-destruct) -->
  <div id="confirm-modal" class="confirm-modal">
    <div class="confirm-dialog">
      <p class="confirm-message" id="confirm-message"></p>
      <div class="confirm-actions">
        <button id="confirm-no" class="confirm-no-btn">Cancel</button>
        <button id="confirm-yes" class="confirm-yes-btn">Delete All</button>
      </div>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-left">
      <img src="./images/logo.png" alt="Logo" class="logo">
      <span class="app-name">The Vault</span>
    </div>
    <div class="navbar-center">
      <input type="text" id="search-bar" class="search-bar" placeholder="Search...">
    </div>
    <div class="navbar-right">
      <div class="dropdown">
        <i class="settings-icon fas fa-cogs"></i>
        <div class="dropdown-menu">
          <div class="menu-row">
            <span class="menu-label">Light Mode</span>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-theme"/>
              <span class="slider"></span>
            </label>
          </div>
          <div class="menu-row">
            <span class="menu-label">Show Passwords</span>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-visibility"/>
              <span class="slider"></span>
            </label>
          </div>
          <p id="num-entries"></p>
          <button id="self-destruct" class="self-destruct-button">Self-Destruct</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Entry type form -->
  <form id="passwordForm">
    <select id="passwordFormHeader">
      <option value="Password">Password</option>
      <option value="Card">Credit / Debit Card</option>
      <option value="Bank">Bank Account</option>
      <option value="ID">ID Numbers</option>
      <option value="Note">Note</option>
    </select>

    <div id="formFields">
      <label for="service">Service:</label>
      <input maxlength="30" type="text" id="service" required />
      <label for="email">Email:</label>
      <input maxlength="30" type="text" id="email" required />
      <label for="username">Username:</label>
      <input maxlength="30" type="text" id="username" required />
      <label for="password">
        Password:
        <button id="toggle-password" type="button" class="fas fa-eye field-action-btn"></button>
        <button id="generate-password" type="button" class="fas fa-key field-action-btn"></button>
      </label>
      <input maxlength="30" type="password" id="password" required />
    </div>
    <button type="submit">Save</button>
  </form>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="passwords">Passwords</button>
    <button class="filter-btn" data-filter="cards">Cards</button>
    <button class="filter-btn" data-filter="bank">Bank</button>
    <button class="filter-btn" data-filter="ids">IDs</button>
    <button class="filter-btn" data-filter="notes">Notes</button>
  </div>

  <!-- Saved items list -->
  <div id="passwordList">
    <script src="renderer.js"></script>
  </div>

</body>
</html>
